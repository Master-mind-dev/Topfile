<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Space</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F8F6FC;
  --surface: #FFFFFF;
  --ink: #1B1730;
  --muted: #847F9C;
  --border: #ECE9F9;
  --accent: #DC2626;
  --accent2: #7C6BFF;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(27,23,48,0.08);
  --c-memory: #8B5CF6;
  --c-note: #F59E0B;
  --c-image: #3B82F6;
  --c-scan: #10B981;
  --c-link: #EC4899;
  --c-file: #6B7280;
}

body.dark {
  --bg: #1A1A2E;
  --surface: #16213E;
  --ink: #E2E8F0;
  --muted: #94A3B8;
  --border: #2D3748;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  transition: .2s;
  min-height: 100vh;
}

.app {
  display: flex;
  min-height: 100vh;
  width: 100%;
}

.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 32px 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Sora', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  padding: 0 10px 20px;
}

.logo .mark {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transform: rotate(-4deg);
  flex-shrink: 0;
  color: white;
}

#tabs {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

/* Samsung structural comfort + Premium iOS physics transition */
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-radius: 14px; /* Softer, premium squircle style rounded edge */
  cursor: pointer;
  color: var(--muted);
  position: relative;
  overflow: hidden;
  
  /* Super fluid sliding physics curve */
  transition: background-color 0.3s cubic-bezier(0.25, 1, 0.5, 1),
              color 0.3s cubic-bezier(0.25, 1, 0.5, 1),
              transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}

/* Softer ambient fade on hover */
.nav-item:hover {
  background: rgba(124, 107, 255, 0.08); /* Light tint matching your secondary accent */
  color: var(--ink);
  transform: translateX(4px); /* Gentle iOS-style slide focus hint */
}

/* Premium active state layout with depth */
.nav-item.active {
  background: var(--accent);
  color: white;
}

.nav-item.active:hover {
  transform: scale(1.02); /* Clean spring push forward when hovering active tab */
}

.nav-item .label { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  font-weight: 600; 
  font-size: 14px; 
}

.nav-item .label .swatch { 
  width: 10px; 
  height: 10px; 
  border-radius: 50%; 
  display: inline-block; 
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Make dot indicators subtly pop out when active or hovered */
.nav-item:hover .label .swatch,
.nav-item.active .label .swatch {
  transform: scale(1.2);
}

.nav-item .count { 
  font-size: 12px; 
  opacity: .7; 
  font-weight: 600; 
  background: rgba(0, 0, 0, 0.05);
  padding: 2px 8px;
  border-radius: 20px;
  transition: background-color 0.25s ease, color 0.25s ease;
}

/* Brighten badge counts on active selection */
.nav-item.active .count { 
  opacity: 1; 
  background: rgba(255, 255, 255, 0.2);
  color: white;
}

.sidebar-foot {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

#userInfo {
  font-size: 13px;
  color: var(--muted);
  padding: 8px 0;
}

#userInfo strong { color: var(--ink); }
#userInfo button {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-weight: 700;
  font-size: 13px;
}

/* Main */
.main {
  flex: 1;
  padding: 40px;
  background: var(--bg);
  min-width: 0;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.top-bar h1 {
  font-family: 'Sora', sans-serif;
  font-size: 28px;
}

.top-bar .actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.top-bar .actions .btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: .15s;
  color: var(--ink);
}

.top-bar .actions .btn:hover { background: var(--bg); border-color: var(--accent); }
.top-bar .actions .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.top-bar .actions .btn.primary:hover { opacity: .9; }

#searchBox {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  min-width: 180px;
  transition: .15s;
}

#searchBox:focus { border-color: var(--accent); outline: none; }

#themeToggle {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}

.storage-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.storage-box .bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  min-width: 80px;
}

.storage-box .bar .fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 4px;
  transition: .3s;
}

.storage-box .figure {
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
}

#viewContainer { 
  min-height: 200px; 
}

/* Apple style elegant slide up + fade entry for view contents */
#viewContainer > * {
  animation: iosSlideIn 0.45s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

@keyframes iosSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* Cards */
/* Samsung structural elegance + Apple high-velocity motion ease */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px; /* Softer, beautiful premium round corners */
  overflow: hidden;
  cursor: pointer;
  position: relative;
  box-shadow: var(--shadow);
  
  /* Extremely smooth spring-like translation duration */
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
              box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1),
              border-color 0.25s ease;
}

/* Fluid lift up with deep floating ambient drop shadow on hover */
.card:hover { 
  transform: translateY(-6px) scale(1.015); 
  border-color: var(--accent2); /* Subtle highlight focus border */
  box-shadow: 0 20px 38px rgba(27, 23, 48, 0.07), 
              0 8px 16px rgba(27, 23, 48, 0.03); 
}

/* Slightly shrink when tapped/clicked to give physical feel */
.card:active {
  transform: translateY(-2px) scale(0.98);
  box-shadow: 0 8px 24px rgba(27, 23, 48, 0.05);
}

.card-top { height: 4px; background: var(--accent); }

.card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: .15s;
}

.card:hover .card-actions { opacity: 1; }

.icon-btn {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  transition: .15s;
  color: var(--ink);
}

.icon-btn:hover { background: var(--bg); }
.icon-btn.danger:hover { background: #FEE2E2; color: #DC2626; border-color: #DC2626; }

.card-body { padding: 12px 14px 14px; }

.type-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--muted);
  margin-bottom: 6px;
}

.type-chip .swatch {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  -o-object-fit: cover;
  object-fit: cover;
  border-radius: 8px;
  margin: 6px 0 8px;
  background: var(--bg);
}

.thumb-wrap {
  position: relative;
  margin: 6px 0 8px;
}

.thumb-wrap .video-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  -o-object-fit: cover;
  object-fit: cover;
  border-radius: 8px;
}

.play-badge {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  transition: .2s;
}

.play-badge span {
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #000;
}

.thumb-wrap:hover .play-badge { background: rgba(0,0,0,0.15); }

.card-title {
  font-weight: 700;
  font-size: 14px;
  margin: 4px 0;
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.3;
}

.card-preview {
  font-size: 12px;
  color: var(--muted);
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}

.link-host {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}

.tag-chip {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 600;
}

/* Space Grid */
/* Samsung clean architecture fluid grid container */
.space-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 24px;
  width: 100%;
  padding: 4px 0;
  margin-bottom: 24px;

  /* Apple performance hardware acceleration setup */
  will-change: transform;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.space-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: .15s;
}

.space-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

.space-tile .icon-badge {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin: 0 auto 10px;
}

.space-tile .name { font-weight: 700; font-size: 14px; }
.space-tile .num { font-size: 12px; color: var(--muted); }

.recent-heading {
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 18px;
  margin: 16px 0 12px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
}

/* Overlays */
/* Premium iOS style blur backdrop */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(27, 23, 48, 0.2); /* Softer tint */
  backdrop-filter: blur(0px); /* Starts at zero blur */
  -webkit-backdrop-filter: blur(0px);
  display: flex; /* Always flex but invisible by default */
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1),
              backdrop-filter 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Smooth fade and blur transition when active */
.overlay.open {
  opacity: 1;
  pointer-events: auto;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* Modals with smooth Apple spring scaling */
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 32px;
  max-width: 560px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  position: relative;
  box-shadow: var(--shadow);
  
  /* Start slightly shrunken down */
  transform: scale(0.92);
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); /* Inertial spring effect */
}

/* Spring pop upward into full scale when open */
.overlay.open .modal {
  transform: scale(1);
}

.modal h2 {
  font-family: 'Sora', sans-serif;
  font-size: 22px;
  margin-bottom: 16px;
}

.modal label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 12px 0 4px;
}

.modal input,
.modal textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  transition: .15s;
  font-family: 'Inter', sans-serif;
}

.modal textarea { min-height: 100px; resize: vertical; }

.modal input:focus,
.modal textarea:focus {
  border-color: var(--accent);
  outline: none;
}

.modal .btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: .15s;
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--border);
}

.modal .btn:hover { opacity: .9; transform: translateY(-1px); }
.modal .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.modal .btn.ghost { background: transparent; border: 1px solid var(--border); }
.modal .btn.ghost:hover { background: var(--bg); }

.modal .btn-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.modal-actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Detail View */
.full-img {
  width: 100%;
  max-height: 60vh;
  -o-object-fit: contain;
  object-fit: contain;
  border-radius: 10px;
  background: var(--bg);
  margin: 8px 0;
}

.viewer-frame {
  width: 100%;
  height: 60vh;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
}

.video-embed {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 10px;
  background: #000;
}

.native-video {
  width: 100%;
  max-height: 70vh;
  border-radius: 10px;
  background: #000;
}

.link-preview-panel {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg);
}

.link-preview-panel img {
  width: 100%;
  aspect-ratio: 16/9;
  -o-object-fit: cover;
  object-fit: cover;
  display: block;
  background: var(--border);
}

.link-preview-body {
  padding: 16px;
}

.link-preview-host {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 6px;
}

.viewer-note {
  font-size: 13px;
  color: var(--muted);
  margin: 8px 0;
  line-height: 1.5;
}

.viewer-note a { color: var(--accent); text-decoration: none; }
.viewer-note a:hover { text-decoration: underline; }

.link-meta-row {
  display: flex;
  gap: 12px;
  font-size: 13px;
  color: var(--muted);
  margin: 4px 0 8px;
  flex-wrap: wrap;
}

.reader-modal {
  max-width: 92vw;
  padding: 0;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
}

.reader-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}

.reader-title { font-weight: 700; font-size: 16px; }
.reader-meta { font-size: 12px; color: var(--muted); }
.reader-body { padding: 16px; height: 70vh; }
.reader-frame { width: 100%; height: 100%; border: none; border-radius: 8px; background: var(--bg); }

.status-line { font-size: 13px; color: var(--muted); padding: 8px 0; }

/* Timeline */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tl-month {
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 18px;
  padding: 16px 0 8px;
  border-bottom: 1px solid var(--border);
}

.tl-entry {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: .15s;
  position: relative;
}

.tl-entry:hover { box-shadow: var(--shadow); }

.tl-date { text-align: center; min-width: 50px; }
.tl-date .day { font-size: 22px; font-weight: 800; line-height: 1; }
.tl-date .wd { font-size: 11px; color: var(--muted); font-weight: 600; }
.tl-content { flex: 1; }
.tl-title { font-weight: 700; font-size: 14px; }
.tl-preview { font-size: 12px; color: var(--muted); display: -webkit-box; line-clamp: 1; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.tl-thumb { width: 56px; height: 56px; -o-object-fit: cover; object-fit: cover; border-radius: 8px; flex-shrink: 0; }

.cam-preview { width: 100%; max-height: 50vh; background: #000; border-radius: 10px; margin: 8px 0; -o-object-fit: cover; object-fit: cover; opacity: 0; transition: opacity .2s; }
.cam-preview.ready { opacity: 1; }

/* === SAMSUNG / IPHONE STYLE CLICK ANIMATION === */
.btn, .icon-btn, .nav-item {
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), 
              background-color 0.2s ease, 
              box-shadow 0.2s ease !important;
}

/* Tactile press-down shrink effect */
.btn:active, .icon-btn:active, .nav-item:active {
  transform: scale(0.93) !important;
}

/* Subtle floating lift on hover */
.btn:hover, .icon-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(27, 23, 48, 0.06);
}

/* Keeps everything stable when clicking while hovering */
.btn:active:hover, .icon-btn:active:hover {
  transform: scale(0.93) translateY(0);
}

/* === VISUAL CUSTOMIZER EDITOR PANEL === */
.customizer-drawer {
  position: fixed;
  top: 0;
  right: -340px;
  width: 320px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow);
  z-index: 1100;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  overflow-y: auto;
}

.customizer-drawer.open {
  right: 0;
}

.customizer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.customizer-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.customizer-group label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* Drag and Drop Visual Handles */
.draggable-section {
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.edit-mode .draggable-section {
  border: 2px dashed var(--accent2) !important;
  border-radius: var(--radius);
  padding: 8px;
  margin-bottom: 8px;
  cursor: grab;
}

.edit-mode .draggable-section.dragging {
  opacity: 0.5;
  cursor: grabbing;
  transform: scale(0.98);
  box-shadow: var(--shadow);
}

/* Control Badges for Delete and Edit */

<script>
// === LIVE CUSTOMIZER MECHANICS (SAMSUNG ONE UI + APPLE ANIMATIONS) ===
let editModeActive = false;

function toggleCustomizerDrawer() {
  const drawer = document.getElementById('customizerDrawer');
  drawer.classList.toggle('open');
}

function updateAccentColor(val) {
  document.documentElement.style.setProperty('--accent', val);
}

function updateTextSize(val) {
  document.getElementById('textSizeLabel').innerText = `Global Text Scale: ${val}px`;
  document.documentElement.style.setProperty('--main-text-size', `${val}px`);
  // Dynamically injecting custom typography override rules
  let styleOverride = document.getElementById('custom-text-override');
  if (!styleOverride) {
    styleOverride = document.createElement('style');
    styleOverride.id = 'custom-text-override';
    document.head.appendChild(styleOverride);
  }
  styleOverride.innerHTML = `body, .card-title, .modal input, .modal textarea { font-size: ${val}px !important; }`;
}

function updateIconSize(val) {
  document.getElementById('iconSizeLabel').innerText = `Icon Frame Dimensions: ${val}px`;
  let styleOverride = document.getElementById('custom-icon-override');
  if (!styleOverride) {
    styleOverride = document.createElement('style');
    styleOverride.id = 'custom-icon-override';
    document.head.appendChild(styleOverride);
  }
  styleOverride.innerHTML = `.icon-btn, .space-tile .icon-badge { width: ${val}px !important; height: ${val}px !important; }`;
}

function toggleEditMode() {
  editModeActive = !editModeActive;
  const mainApp = document.querySelector('.app');
  const toggleBtn = document.getElementById('editModeToggle');
  
  if (editModeActive) {
    mainApp.classList.add('edit-mode');
    toggleBtn.innerText = '💾 Save Layout Settings';
    toggleBtn.style.background = 'var(--c-scan)';
    enableDragAndDropMechanics();
  } else {
    mainApp.classList.remove('edit-mode');
    toggleBtn.innerText = '🛠️ Toggle Drag & Drop';
    toggleBtn.style.background = 'var(--accent)';
    disableDragAndDropMechanics();
  }
}

function enableDragAndDropMechanics() {
  // Turn view widgets, storage box, or navigation bars into layout draggables
  const targets = document.querySelectorAll('.storage-box, #viewContainer, #tabs, .top-bar');
  targets.forEach(target => {
    target.classList.add('draggable-section');
    target.setAttribute('draggable', 'true');
    
    // Add deletion overlay option controls if they don't exist
    if (!target.querySelector('.section-controls')) {
      const controls = document.createElement('div');
      controls.className = 'section-controls';
      controls.innerHTML = `<button class="icon-btn danger" onclick="this.closest('.draggable-section').style.display='none'; event.stopPropagation();">✕ Remove</button>`;
      target.appendChild(controls);
    }

    target.addEventListener('dragstart', handleDragStart);
    target.addEventListener('dragover', handleDragOver);
    target.addEventListener('drop', handleDrop);
    target.addEventListener('dragend', handleDragEnd);
  });
}

function disableDragAndDropMechanics() {
  const targets = document.querySelectorAll('.draggable-section');
  targets.forEach(target => {
    target.setAttribute('draggable', 'false');
    target.classList.remove('dragging');
  });
}

let dragSrcEl = null;

function handleDragStart(e) {
  this.classList.add('dragging');
  dragSrcEl = this;
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  if (e.preventDefault) e.preventDefault();
  return false;
}

function handleDrop(e) {
  if (e.stopPropagation) e.stopPropagation();
  if (dragSrcEl !== this) {
    // Elegant apple structure node position swapping mechanics
    const parent = this.parentNode;
    const allNodes = Array.from(parent.children);
    const srcIndex = allNodes.indexOf(dragSrcEl);
    const targetIndex = allNodes.indexOf(this);
    
    if (srcIndex < targetIndex) {
      parent.insertBefore(dragSrcEl, this.nextSibling);
    } else {
      parent.insertBefore(dragSrcEl, this);
    }
  }
  return false;
}

function handleDragEnd() {
  this.classList.remove('dragging');
}

function resetLayout() {
  localStorage.clear();
  window.location.reload();
}
// ================= CONSTANTS =================
const CATEGORIES = [
  { id: 'home', label: '🏠 Home', icon: '🏠', color: null },
  { id: 'memory', label: '📔 Memories', icon: '📔', color: 'var(--c-memory)' },

  { id: 'image', label: '🖼️ Images', icon: '🖼️', color: 'var(--c-image)' },
  { id: 'scan', label: '📷 Scans', icon: '📷', color: 'var(--c-scan)' },
  { id: 'link', label: '🔗 Links', icon: '🔗', color: 'var(--c-link)' },
  { id: 'file', label: '📁 Files', icon: '📁', color: 'var(--c-file)' },
];
const COLOR_MAP = { memory: 'var(--c-memory)', note: 'var(--c-note)', image: 'var(--c-image)', scan: 'var(--c-scan)', link: 'var(--c-link)', file: 'var(--c-file)' };
const API_URL = window.location.origin + '/api';

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBU_vTdK1WxEfHi-MEZDfdMCR89fbVsiHg",
  authDomain: "personal-space-7c96d.firebaseapp.com",

  storageBucket: "personal-space-7c96d.firebasestorage.app",
  messagingSenderId: "458025475917",
  appId: "1:458025475917:web:34b47c0edd64d294c3e104"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ================= STATE =================
let currentTab = 'home';
let items = [];
let currentUser = null;
const canvas = document.createElement('canvas');

// ================= DOM HELPERS =================
function $(id) { return document.getElementById(id); }
function openOverlay(id) { const el = $(id); if (el) el.classList.add('open'); }
function closeOverlay(id) { const el = $(id); if (el) el.classList.remove('open'); }

document.addEventListener('click', (e) => {
  const closeBtn = e.target.closest('[data-close]');
  if (closeBtn) closeOverlay(closeBtn.dataset.close);
});

// ================= AUTH =================
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("userInfo").innerHTML = `
      Logged in as <strong>${user.email}</strong> · 
      <button onclick="logout()">Logout</button>
    `;
    await loadItems();
    render();
  } else {
    window.location.href = "pop.html";
  }
});

function logout() {
  auth.signOut().then(() => window.location.href = "pop.html");
}

// ================= STORAGE FUNCTIONS =================
function getCollection(name) {
  return db.collection("users").doc(currentUser.uid).collection(name);
}

async function saveItem(item) {
  const data = { ...item };
  delete data.id;
  await getCollection(item.type).doc(item.id).set(data);
}

async function deleteItem(item) {
  await getCollection(item.type).doc(item.id).delete();
}

async function loadItems() {
  const types = ['memory', 'note', 'image', 'scan', 'link', 'file'];
  // Fire all 6 collection queries at once instead of waiting for each
  // one in turn — this was the main reason loading felt slow.
  const results = await Promise.all(types.map(async (type) => {
    try {
      const snapshot = await getCollection(type).orderBy('createdAt', 'desc').get();
      return snapshot.docs.map(doc => ({ id: doc.id, type: type, ...doc.data() }));
    } catch (e) {
      console.log('Error loading', type, e);
      return [];
    }
  }));
  items = results.flat();
  items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  return items;
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function fmtBytes(b) { 
  if (!b) return '0 B';
  if (b < 1024) return b + ' B'; 
  if (b < 1024*1024) return (b/1024).toFixed(0) + ' KB'; 
  return (b/(1024*1024)).toFixed(1) + ' MB'; 
}

function timeAgo(ts) { 
  if (!ts) return '';
  return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); 
}

function escapeHtml(str) { 
  if (!str) return ''; 
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getEmbedUrl(item) {
  if (item.embedProvider === 'youtube' && item.embedId) return `https://www.youtube.com/embed/${encodeURIComponent(item.embedId)}`;
  if (item.embedProvider === 'vimeo' && item.embedId) return `https://player.vimeo.com/video/${encodeURIComponent(item.embedId)}`;
  if (item.embedProvider === 'dailymotion' && item.embedId) return `https://www.dailymotion.com/embed/video/${encodeURIComponent(item.embedId)}`;
  return '';
}

function isPlayableLink(item) {
  return item.type === 'link' && ['youtube', 'vimeo', 'dailymotion', 'native_video'].includes(item.embedProvider);
}

// ================= RENDERING =================
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const count = cat.id === 'home' ? items.length : items.filter(i => i.type === cat.id).length;
    const div = document.createElement('div');
    div.className = 'nav-item' + (currentTab === cat.id ? ' active' : '');
    const swatch = cat.color ? `<span class="swatch" style="background:${cat.color}"></span>` : `<span>${cat.icon}</span>`;
    div.innerHTML = `<span class="label">${swatch}${cat.label}</span><span class="count">${cat.id==='home' ? '' : count}</span>`;
    div.addEventListener('click', () => { currentTab = cat.id; document.getElementById('pageTitle').textContent = cat.label; render(); });
    tabsEl.appendChild(div);
  });
}

function renderStorageBox() {
  document.getElementById('storageFigure').textContent = `${items.length} item${items.length===1?'':'s'}`;
  document.getElementById('storageFill').style.width = Math.min(100, (items.length / 50) * 100) + '%';
}

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  const color = COLOR_MAP[item.type] || 'var(--muted)';
  let thumbHtml = '';

  if (item.type === 'link' && item.embedThumb) {
    const playBadge = isPlayableLink(item) ? '<div class="play-badge"><span>Play</span></div>' : '';
    thumbHtml = `<div class="thumb-wrap"><img class="card-thumb video-thumb" src="${escapeAttr(item.embedThumb)}" alt="">${playBadge}</div>`;
  } else if (item.thumb) {
    thumbHtml = `<img class="card-thumb" src="${escapeAttr(item.thumb)}" alt="">`;
  }

  const tagsHtml = (item.tags||[]).slice(0,2).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
  const hostBadge = item.type === 'link' && item.linkHost ? `<span class="link-host">${escapeHtml(item.linkHost)}</span>` : '';

  card.innerHTML = `
    <div class="card-top" style="background:${color}"></div>
    <div class="card-actions">
      <div class="icon-btn" title="Edit" data-action="edit">Edit</div>
      <div class="icon-btn danger" title="Delete" data-action="delete">Del</div>
    </div>
    <div class="card-body">
      <span class="type-chip"><span class="swatch" style="background:${color}"></span>${escapeHtml(item.type)}</span>
      ${thumbHtml}
      <div class="card-title">${escapeHtml(item.title)}</div>
      <div class="card-preview">${escapeHtml(item.description || item.content || item.url || '')}</div>
      ${hostBadge}
      <div class="card-meta"><span>${timeAgo(item.createdAt)}</span><span>${tagsHtml}</span></div>
    </div>`;

  card.querySelector('[data-action="edit"]').addEventListener('click', (e) => { e.stopPropagation(); openEdit(item); });
  card.querySelector('[data-action="delete"]').addEventListener('click', async (e) => {
    e.stopPropagation();
    if (confirm(`Delete "${item.title}"?`)) {
      await deleteItem(item);
      items = items.filter(i => i.id !== item.id);
      render();
    }
  });
  card.addEventListener('click', () => openDetail(item));
  return card;
}

function renderHome() {
  const container = document.getElementById('viewContainer');
  container.innerHTML = '';
  const spaceGrid = document.createElement('div');
  spaceGrid.className = 'space-grid';
  CATEGORIES.filter(c => c.id !== 'home').forEach(cat => {
    const count = items.filter(i => i.type === cat.id).length;
    const tile = document.createElement('div');
    tile.className = 'space-tile';
    tile.innerHTML = `
      <div class="icon-badge" style="background:${cat.color};color:#fff;">${cat.icon}</div>
      <div class="name">${cat.label}</div>
      <div class="num">${count} item${count===1?'':'s'}</div>`;
    tile.addEventListener('click', () => { currentTab = cat.id; document.getElementById('pageTitle').textContent = cat.label; render(); });
    spaceGrid.appendChild(tile);
  });
  container.appendChild(spaceGrid);
  
  if (items.length) {
    const heading = document.createElement('div');
    heading.className = 'recent-heading';
    heading.textContent = 'Recently added';
    container.appendChild(heading);
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.slice(0, 6).forEach(item => grid.appendChild(buildCard(item)));
    container.appendChild(grid);
  }
}

function renderGrid() {
  const container = document.getElementById('viewContainer');
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  let list = items.filter(i => i.type === currentTab);
  if (q) list = list.filter(i => [i.title, (i.tags||[]).join(' '), i.content||'', i.url||'', i.description||''].join(' ').toLowerCase().includes(q));
  
  if (currentTab === 'memory') { renderTimeline(container, list); return; }
  
  container.innerHTML = '<div class="grid" id="grid"></div>';
  const grid = document.getElementById('grid');
  if (list.length === 0) { grid.innerHTML = `<div class="empty-state">Nothing here yet.<br>Add something with the buttons above.</div>`; return; }
  list.forEach(item => grid.appendChild(buildCard(item)));
}

function renderTimeline(container, list) {
  container.innerHTML = '';
  if (list.length === 0) { container.innerHTML = `<div class="empty-state">No memories yet.<br>Add one with the button above.</div>`; return; }
  const wrap = document.createElement('div');
  wrap.className = 'timeline';
  let lastMonth = null;
  list.forEach(item => {
    const d = new Date(item.createdAt);
    const monthLabel = d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    if (monthLabel !== lastMonth) { const h = document.createElement('div'); h.className = 'tl-month'; h.textContent = monthLabel; wrap.appendChild(h); lastMonth = monthLabel; }
    const entry = document.createElement('div');
    entry.className = 'tl-entry';
    const thumbHtml = item.thumb ? `<img class="tl-thumb" src="${item.thumb}">` : '';
    entry.innerHTML = `
      <div class="tl-date"><div class="day">${d.getDate()}</div><div class="wd">${d.toLocaleDateString(undefined,{weekday:'short'})}</div></div>
      <div class="tl-content"><div class="tl-title">${escapeHtml(item.title)}</div><div class="tl-preview">${escapeHtml(item.content || '')}</div></div>
      ${thumbHtml}
      <div class="card-actions" style="opacity:1;top:10px;"><div class="icon-btn" data-action="edit">✏️</div><div class="icon-btn danger" data-action="delete">🗑</div></div>`;
    entry.querySelector('[data-action="edit"]').addEventListener('click', (e) => { e.stopPropagation(); openEdit(item); });
    entry.querySelector('[data-action="delete"]').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm(`Delete "${item.title}"?`)) { await deleteItem(item); items = items.filter(i => i.id !== item.id); render(); }
    });
    entry.addEventListener('click', () => openDetail(item));
    wrap.appendChild(entry);
  });
  container.appendChild(wrap);
}

function render() {
  renderTabs(); 
  renderStorageBox();
  if (currentTab === 'home') renderHome(); 
  else renderGrid();
}

// ================= DETAIL VIEW =================
function resetViewerLayout() {
  const overlay = document.getElementById('viewOverlay');
  if (overlay) overlay.classList.remove('reader-overlay');
  const body = document.getElementById('viewModalBody');
  if (body) body.className = 'modal wide';
}

function enterReaderMode() {
  const overlay = document.getElementById('viewOverlay');
  if (overlay) overlay.classList.add('reader-overlay');
  const body = document.getElementById('viewModalBody');
  if (body) body.className = 'modal reader-modal';
}

function openDetailOldUnused(item) {
  const body = document.getElementById('viewModalBody');
  if (!body) return;
  
  // YouTube/Vimeo videos
  if (item.type === 'link' && item.embedProvider === 'youtube') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <iframe class="video-embed" src="https://www.youtube.com/embed/${item.embedId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      ${item.embedAuthor ? `<div class="link-meta-row">${escapeHtml(item.embedAuthor)}</div>` : ''}
      <div class="viewer-note"><a href="${item.url}" target="_blank" rel="noopener">Open original ↗</a></div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }
  
  if (item.type === 'link' && item.embedProvider === 'vimeo') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <iframe class="video-embed" src="https://player.vimeo.com/video/${item.embedId}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      <div class="viewer-note"><a href="${item.url}" target="_blank" rel="noopener">Open original ↗</a></div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }
  
  // Generic links - open in iframe (stays in app)
  if (item.type === 'link') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <iframe class="viewer-frame" src="${item.url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div class="viewer-note">If nothing appears, the site may not allow embedding. <a href="${item.url}" target="_blank" rel="noopener">Open in new tab ↗</a></div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }
  
  // Images
  if (item.type === 'image' || item.type === 'scan') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <img class="full-img" src="${item.thumb || item.url || ''}">
      <div class="viewer-note">${escapeHtml(item.description || item.content || '')}</div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }
  
  // Notes, Memories, Files
  body.innerHTML = `
    <h2>${escapeHtml(item.title)}</h2>
    <div class="viewer-note" style="white-space:pre-wrap;">${escapeHtml(item.content || '')}</div>
    ${item.url ? `<div class="viewer-note"><a href="${item.url}" target="_blank">${item.url}</a></div>` : ''}
    <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
  openOverlay('viewOverlay');
}

function openDetail(item) {
  const body = document.getElementById('viewModalBody');
  if (!body) return;
  resetViewerLayout();

  if (isPlayableLink(item) && item.embedProvider !== 'native_video') {
    const embedUrl = getEmbedUrl(item);
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <iframe class="video-embed" src="${escapeAttr(embedUrl)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
      <div class="link-meta-row"><span>${escapeHtml(item.linkHost || item.embedProvider)}</span></div>
      <div class="viewer-note">${escapeHtml(item.description || '')}</div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }

  if (item.type === 'link' && item.embedProvider === 'native_video') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <video class="native-video" src="${escapeAttr(item.embedId || item.url)}" controls playsinline></video>
      <div class="link-meta-row"><span>${escapeHtml(item.linkHost || 'Video')}</span></div>
      <div class="viewer-note">${escapeHtml(item.description || '')}</div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }

  if (item.type === 'link') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <iframe class="viewer-frame" src="${escapeAttr(item.url)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
      <div class="viewer-note">Trying to show this page inside your space. If it stays blank, that site has told browsers to refuse being shown inside other apps — that's the site's own rule, not something this app can override. Use "Open Website" below instead.</div>
      <div class="modal-actions">
        <button class="btn ghost" data-close="viewOverlay">Close</button>
        <a class="btn primary" href="${escapeAttr(item.url || '#')}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center;">Open Website ↗</a>
      </div>`;
    openOverlay('viewOverlay');
    return;
  }

  if (item.type === 'image' || item.type === 'scan') {
    body.innerHTML = `
      <h2>${escapeHtml(item.title)}</h2>
      <img class="full-img" src="${escapeAttr(item.thumb || item.url || '')}" alt="">
      <div class="viewer-note">${escapeHtml(item.description || item.content || '')}</div>
      <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
    openOverlay('viewOverlay');
    return;
  }

  body.innerHTML = `
    <h2>${escapeHtml(item.title)}</h2>
    <div class="viewer-note" style="white-space:pre-wrap;">${escapeHtml(item.content || item.description || '')}</div>
    <div class="modal-actions"><button class="btn ghost" data-close="viewOverlay">Close</button></div>`;
  openOverlay('viewOverlay');
}

// ================= EDIT =================
function openEdit(item) {
  document.getElementById('editTitle').value = item.title || '';
  const wrap = document.getElementById('editContentWrap');
  const contentBox = document.getElementById('editContent');
  const editableTypes = ['note', 'memory'];
  if (editableTypes.includes(item.type)) {
    wrap.style.display = 'block';
    contentBox.value = item.content || '';
  } else {
    wrap.style.display = 'none';
  }
  document.getElementById('editSave').onclick = async () => {
    item.title = document.getElementById('editTitle').value.trim() || item.title;
    if (wrap.style.display !== 'none') item.content = contentBox.value;
    await saveItem(item);
    closeOverlay('editOverlay');
    render();
  };
  openOverlay('editOverlay');
}

// ================= ADD: NOTE =================
document.getElementById('btnNote').addEventListener('click', () => {
  document.getElementById('noteText').value = '';
  openOverlay('noteOverlay');
});

document.getElementById('noteSave').addEventListener('click', async () => {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  const item = { id: genId(), type: 'note', title: text.slice(0, 48), content: text, createdAt: Date.now(), tags: ['note'] };
  await saveItem(item);
  items.unshift(item);
  closeOverlay('noteOverlay');
  currentTab = 'note';
  document.getElementById('pageTitle').textContent = 'Notes';
  render();
});

// ================= ADD: MEMORY =================
document.getElementById('btnMemory').addEventListener('click', () => {
  document.getElementById('memoryDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('memoryText').value = '';
  document.getElementById('memoryUrl').value = '';
  document.getElementById('memoryLinkWrap').style.display = 'none';
  document.getElementById('memoryPhotoPreview').style.display = 'none';
  openOverlay('memoryOverlay');
});

document.getElementById('memoryLinkBtn').addEventListener('click', () => {
  const wrap = document.getElementById('memoryLinkWrap');
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('memoryPhotoBtn').addEventListener('click', () => document.getElementById('memoryPhotoInput').click());

document.getElementById('memoryPhotoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('memoryPhotoPreview').src = ev.target.result;
    document.getElementById('memoryPhotoPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
});

document.getElementById('memorySave').addEventListener('click', async () => {
  const text = document.getElementById('memoryText').value.trim();
  const url = document.getElementById('memoryUrl').value.trim();
  const dateStr = document.getElementById('memoryDate').value;
  if (!text && !url && !document.getElementById('memoryPhotoPreview').src) {
    alert('Please add some content, a link, or a photo.');
    return;
  }
  
  const item = { 
    id: genId(), 
    type: 'memory', 
    title: text ? text.slice(0, 40) : (url ? new URL(url).hostname.replace('www.', '') : 'A memory'),
    content: text,
    url: url || '',
    createdAt: dateStr ? new Date(dateStr + 'T12:00:00').getTime() : Date.now(),
    tags: ['memory']
  };
  
  // Handle photo upload
  const preview = document.getElementById('memoryPhotoPreview');
  if (preview.style.display !== 'none' && preview.src) {
    const photoData = preview.src;
    item.thumb = photoData;
    // Upload to Firebase Storage
    try {
      const path = `users/${currentUser.uid}/memories/${item.id}.jpg`;
      const ref = storage.ref(path);
      const blob = await fetch(photoData).then(r => r.blob());
      await ref.put(blob);
      item.url = await ref.getDownloadURL();
    } catch (e) {
      console.error('Photo upload failed:', e);
    }
  }
  
  await saveItem(item);
  items.unshift(item);
  closeOverlay('memoryOverlay');
  currentTab = 'memory';
  document.getElementById('pageTitle').textContent = 'Memories';
  render();
});

// ================= ADD: LINK WITH BACKEND =================
document.getElementById('btnLink').addEventListener('click', () => {
  document.getElementById('linkUrl').value = '';
  document.getElementById('linkStatus').textContent = '';
  openOverlay('linkOverlay');
});

document.getElementById('linkSave').addEventListener('click', async () => {
  let url = document.getElementById('linkUrl').value.trim();
  if (!url) {
    document.getElementById('linkStatus').textContent = 'Please enter a URL';
    return;
  }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  
  const btn = document.getElementById('linkSave');
  btn.disabled = true;
  document.getElementById('linkStatus').textContent = 'Fetching link metadata...';
  
  try {
    // Call backend to parse the link
    const response = await fetch(`${API_URL}/parse-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    
    if (!response.ok) {
      throw new Error('Backend not responding. Make sure the server is running on port 5000');
    }
    
    const data = await response.json();
    
    const item = {
      id: genId(),
      type: 'link',
      url: url,
      title: data.title || url,
      description: data.description || '',
      embedThumb: data.embedThumb || '',
      linkHost: data.linkHost || new URL(url).hostname.replace('www.', ''),
      embedProvider: data.embedProvider || 'generic',
      embedId: data.embedId || '',
      isPlayable: Boolean(data.isPlayable),
      createdAt: Date.now(),
      tags: ['link']
    };
    
    await saveItem(item);
    items.unshift(item);
    document.getElementById('linkStatus').textContent = '✅ Link saved!';
    btn.disabled = false;
    setTimeout(() => {
      closeOverlay('linkOverlay');
      currentTab = 'link';
      document.getElementById('pageTitle').textContent = 'Links';
      render();
    }, 500);
  } catch (error) {
    document.getElementById('linkStatus').textContent = '❌ Error: ' + error.message;
    btn.disabled = false;
  }
});

// ================= ADD: SCAN (live camera, front/back) =================
let camStream = null;
let camFacing = 'environment'; // 'environment' = back camera, 'user' = front camera

async function startCamera(facing) {
  const statusEl = document.getElementById('camStatus');
  const videoEl = document.getElementById('camPreview');
  stopCamera(); // stop any previous stream first
  videoEl.classList.remove('ready');
  statusEl.textContent = 'Starting camera...';
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing } },
      audio: false
    });
    videoEl.srcObject = camStream;
    videoEl.onloadeddata = () => videoEl.classList.add('ready');
    camFacing = facing;
    statusEl.textContent = facing === 'user' ? 'Front camera' : 'Back camera';
  } catch (err) {
    console.error('Camera error:', err);
    statusEl.textContent = '⚠️ Camera unavailable (' + err.message + '). Use "Choose File" instead.';
  }
}

function stopCamera() {
  if (camStream) {
    camStream.getTracks().forEach(t => t.stop());
    camStream = null;
  }
}

async function saveScanItem(dataUrl, filenameHint) {
  const id = genId();
  const item = {
    id,
    type: 'scan',
    title: filenameHint || ('Scan ' + new Date().toLocaleString()),
    description: 'Scanned document',
    createdAt: Date.now(),
    tags: ['scan']
  };
  try {
    // Upload to Firebase Storage instead of stuffing base64 into Firestore
    // (Firestore documents are capped at 1MB, which large photos blow past)
    const path = `users/${currentUser.uid}/scans/${id}.jpg`;
    const ref = storage.ref(path);
    const blob = await fetch(dataUrl).then(r => r.blob());
    await ref.put(blob);
    item.thumb = await ref.getDownloadURL();
    await saveItem(item);
    items.unshift(item);
    currentTab = 'scan';
    document.getElementById('pageTitle').textContent = 'Scans';
    render();
    return true;
  } catch (err) {
    console.error('Scan save failed:', err);
    alert('Could not save scan: ' + err.message);
    return false;
  }
}

document.getElementById('btnScan').addEventListener('click', () => {
  document.getElementById('camStatus').textContent = 'Starting camera...';
  openOverlay('camOverlay');
  startCamera(camFacing);
});

document.addEventListener('click', (e) => {
  if (e.target.closest('[data-close="camOverlay"]')) stopCamera();
});

document.getElementById('camFlip').addEventListener('click', () => {
  startCamera(camFacing === 'environment' ? 'user' : 'environment');
});

document.getElementById('camCapture').addEventListener('click', async () => {
  const videoEl = document.getElementById('camPreview');
  if (!camStream || !videoEl.videoWidth) {
    document.getElementById('camStatus').textContent = 'Camera not ready yet, wait a second and try again.';
    return;
  }
  canvas.width = videoEl.videoWidth;
  canvas.height = videoEl.videoHeight;
  canvas.getContext('2d').drawImage(videoEl, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  document.getElementById('camStatus').textContent = 'Saving...';
  const ok = await saveScanItem(dataUrl);
  if (ok) {
    stopCamera();
    closeOverlay('camOverlay');
  } else {
    document.getElementById('camStatus').textContent = 'Save failed, try again.';
  }
});

document.getElementById('camPickFile').addEventListener('click', () => {
  document.getElementById('scanInput').click();
});

document.getElementById('scanInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const ok = await saveScanItem(ev.target.result, file.name);
    if (ok) {
      stopCamera();
      closeOverlay('camOverlay');
    }
  };
  reader.readAsDataURL(file);
});

// ================= ADD: UPLOAD =================
document.getElementById('btnUpload').addEventListener('click', () => document.getElementById('fileInput').click());

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      const isImage = file.type.startsWith('image/');
      const id = genId();
      const item = {
        id,
        type: isImage ? 'image' : 'file',
        title: file.name,
        thumb: null,
        content: isImage ? '' : `${file.name} · ${fmtBytes(file.size)}`,
        createdAt: Date.now(),
        tags: [isImage ? 'image' : 'file']
      };
      try {
        // Upload the actual bytes to Firebase Storage rather than embedding
        // base64 in the Firestore document (Firestore has a hard 1MB/doc cap,
        // which most photos exceed once base64-encoded — that was causing
        // saves to silently fail).
        const path = `users/${currentUser.uid}/${item.type}s/${id}_${file.name}`;
        const ref = storage.ref(path);
        const blob = await fetch(dataUrl).then(r => r.blob());
        await ref.put(blob);
        const url = await ref.getDownloadURL();
        if (isImage) item.thumb = url; else item.url = url;
        await saveItem(item);
        items.unshift(item);
        render();
      } catch (err) {
        console.error('Upload failed:', err);
        alert(`Could not upload "${file.name}": ${err.message}`);
      }
    };
    reader.readAsDataURL(file);
  }
});

// ================= SEARCH =================
document.getElementById('searchBox').addEventListener('input', () => {
  if (currentTab !== 'home') renderGrid();
});

// ================= THEME =================
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('dark');
});

// Initial render
render();
</script>
